[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "model-router"
version = "0.1.0"
description = "Minimal shared model access layer for local projects"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["model_router*"]
