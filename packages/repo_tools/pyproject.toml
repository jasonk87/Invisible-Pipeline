[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "repo-tools"
version = "0.1.0"
description = "Small, safe, read-only project inspection toolkit"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["repo_tools*"]
