[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tool-core"
version = "0.1.0"
description = "Minimal object-oriented tool system for local AI agents"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["tool_core*"]
