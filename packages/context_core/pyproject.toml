[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "context-core"
version = "0.1.0"
description = "Strict section-aware context packing for LLM prompts"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["context_core*"]
