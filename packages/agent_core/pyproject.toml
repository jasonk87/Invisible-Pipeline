[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-core"
version = "0.1.0"
description = "Minimal object-oriented agent composition layer"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["agent_core*"]
