[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-core"
version = "0.1.0"
description = "Strict workspace boundary enforcement for local tools"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["workspace_core*"]
