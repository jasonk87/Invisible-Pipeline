[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "memory-core"
version = "0.1.0"
description = "Minimal shared local memory module for Python projects"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["memory_core*"]
