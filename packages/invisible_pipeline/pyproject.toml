[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "invisible-pipeline"
version = "0.1.0"
description = "Minimal invisible pipeline for independent LLM re-evaluation"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["invisible_pipeline*"]
